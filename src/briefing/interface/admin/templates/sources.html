{% extends "base.html" %}
{% block title %}Sources — Briefing{% endblock %}
{% block body %}

<h1 class="text-2xl font-semibold tracking-tight mb-1">Sources</h1>
<p class="text-sm text-slate-500 dark:text-slate-400 mb-6">등록된 SourceAdapter 목록</p>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
  {% for s in items %}
    <div class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5 shadow-sm">
      <div class="flex items-start justify-between">
        <div>
          <p class="text-sm font-medium">{{ s.name }}</p>
          <p class="mt-1 text-xs text-slate-500 dark:text-slate-400 mono">webhook: /webhook/{{ s.name }}</p>
        </div>
        <span class="text-2xl font-semibold text-slate-900 dark:text-white">{{ s.count }}</span>
      </div>
    </div>
  {% else %}
    <div class="col-span-full text-sm text-slate-500">등록된 source가 없습니다.</div>
  {% endfor %}
</div>
{% endblock %}
